<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DOC-SCRIBE.AI — Product Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080c14;font-family:'Inter',system-ui,sans-serif}

/* ── Full-screen shell ── */
#shell{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  background:radial-gradient(ellipse at 50% 30%,#0d1f3c 0%,#080c14 70%);
  padding:20px;
}

/* ── MacBook outer bezel ── */
#macbook{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  flex-shrink:0;
}
/* Lid */
#macbook-lid{
  position:relative;
  background:linear-gradient(180deg,#2a2a2e 0%,#1c1c1e 100%);
  border-radius:16px 16px 0 0;
  padding:10px 10px 0;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    0 -2px 8px rgba(0,0,0,0.5),
    0 40px 80px rgba(0,0,0,0.7);
}
/* Camera notch */
#macbook-camera{
  position:absolute;top:5px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;
  background:#111;border:1px solid rgba(255,255,255,0.08);
  z-index:2;
}
/* Screen inner */
#macbook-screen{
  border-radius:8px;
  overflow:hidden;
  background:#000;
  line-height:0;
}
/* Base / hinge */
#macbook-base{
  width:100%;
  height:14px;
  background:linear-gradient(180deg,#3a3a3c 0%,#2c2c2e 60%,#1c1c1e 100%);
  border-radius:0 0 4px 4px;
  position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);
}
/* Hinge line */
#macbook-base::before{
  content:'';
  position:absolute;top:3px;left:50%;transform:translateX(-50%);
  width:60px;height:4px;border-radius:2px;
  background:rgba(0,0,0,0.35);
}
/* Bottom foot */
#macbook-foot{
  width:80%;height:4px;
  background:linear-gradient(90deg,transparent,#1c1c1e 20%,#2a2a2c 50%,#1c1c1e 80%,transparent);
  border-radius:0 0 8px 8px;
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
}

/* ── MacOS window frame ── */
#mac-window{
  border-radius:8px!important;
  position:relative;
  border-radius:14px;overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.1),
    0 40px 100px rgba(0,0,0,0.7),
    0 8px 32px rgba(0,0,0,0.5);
  flex-shrink:0;
  background:#000;
}

/* Title bar */
#title-bar{
  height:38px;
  background:linear-gradient(180deg,#2a2a2c 0%,#222224 100%);
  border-bottom:1px solid rgba(0,0,0,0.5);
  display:flex;align-items:center;
  padding:0 14px;gap:8px;
  position:relative;flex-shrink:0;
}
.traffic-dot{width:13px;height:13px;border-radius:50%}
#title-text{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);
  letter-spacing:.01em;white-space:nowrap;
  font-family:'Inter',sans-serif;
}
.title-dot{color:#00e676}

/* Video area */
#video-wrap{
  position:relative;width:100%;background:#000;line-height:0;
  overflow:hidden;
}
#main-video{
  width:100%;display:block;
  transform-origin:center;

}

/* ── Chapter flash ── */
#flash{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,230,118,0.35),rgba(255,255,255,0.25));
  opacity:0;pointer-events:none;z-index:20;
  border-radius:0;
}
#flash.pop{animation:flashPop .45s ease-out forwards}
@keyframes flashPop{
  0%{opacity:.7}
  100%{opacity:0}
}

/* ── Chapter pill (top center, inside video) ── */
#chapter-pill{
  position:absolute;top:14px;left:50%;
  transform:translateX(-50%) translateY(-12px);
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.7);
  border:1px solid rgba(0,230,118,.3);
  border-radius:50px;padding:7px 16px;
  backdrop-filter:blur(16px);
  opacity:0;transition:opacity .4s,transform .4s;
  white-space:nowrap;z-index:10;
}
#chapter-pill.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pill-step{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:#00e676;letter-spacing:.16em;text-transform:uppercase;
  background:rgba(0,230,118,.14);padding:2px 8px;border-radius:8px;
}
.pill-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.01em}

/* ── Subtitle ── */
#subtitle-bar{
  position:absolute;bottom:10px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  transition:opacity .45s;z-index:10;
}
#subtitle-bar.show{opacity:1}
#subtitle-inner{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(16px);
  border-radius:8px;padding:8px 18px;
  border:1px solid rgba(255,255,255,.07);
}
#subtitle-icon{font-size:15px;flex-shrink:0}
#subtitle-text{font-size:13px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:-.01em}

/* ── Progress bar ── */
#progress-area{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:rgba(255,255,255,.1);cursor:pointer;z-index:15;
  transition:height .2s;
}
#progress-area:hover{height:5px}
#progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#00e676,#00b894);
  pointer-events:none;transition:width .1s linear;
}
.cdot{
  position:absolute;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;
  background:#fff;border:2px solid #00e676;
  cursor:pointer;z-index:2;transition:transform .2s;
}
.cdot:hover{transform:translateY(-50%) scale(2)}

/* ── Controls row ── */
#controls{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:0 4px;flex-shrink:0;
}
.cbtn{
  width:30px;height:30px;border-radius:7px;flex-shrink:0;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  color:#eef2ff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.cbtn:hover{background:rgba(0,230,118,.15);border-color:rgba(0,230,118,.3)}
#time-display{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:rgba(238,242,255,.4);white-space:nowrap;flex-shrink:0;
}
#cur-chapter{
  flex:1;font-size:12px;font-weight:500;
  color:rgba(238,242,255,.4);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── Chapter strip ── */
#chapter-strip{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  width:100%;flex-shrink:0;
}
.cstep{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  cursor:pointer;transition:all .2s;
  font-size:11px;color:rgba(238,242,255,.45);
  white-space:nowrap;
}
.cstep:hover{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.25);color:#fff}
.cstep.active{
  background:rgba(0,230,118,.12);
  border-color:rgba(0,230,118,.4);
  color:#00e676;font-weight:600;
}
.cstep-time{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:.45;margin-left:2px}

/* ── Intro overlay ── */
#intro{
  position:absolute;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  cursor:pointer;pointer-events:all;
  transition:opacity .6s;border-radius:0;
}
#intro.out{opacity:0;pointer-events:none}
#intro::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,230,118,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,230,118,.03) 1px,transparent 1px);
  background-size:40px 40px;
  animation:bgScroll 10s linear infinite;
}
@keyframes bgScroll{from{background-position:0 0}to{background-position:40px 40px}}
.intro-logo{
  position:relative;z-index:1;
  font-size:30px;font-weight:800;color:#fff;letter-spacing:-.02em;
}
.intro-logo span{color:#00e676}
.intro-sub{
  position:relative;z-index:1;
  font-size:14px;font-weight:300;color:rgba(255,255,255,.45);
}
.intro-btn{
  position:relative;z-index:1;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#00e676,#00b894);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 12px rgba(0,230,118,.1),0 0 40px rgba(0,230,118,.5);
  animation:btnGlow 2s ease-in-out infinite;
}
@keyframes btnGlow{
  0%,100%{box-shadow:0 0 0 12px rgba(0,230,118,.1),0 0 40px rgba(0,230,118,.5)}
  50%{box-shadow:0 0 0 20px rgba(0,230,118,.06),0 0 60px rgba(0,230,118,.7)}
}
@keyframes glowPulse{
  0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
}

/* ── Keyboard toast ── */
#kb-toast{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:6px 14px;
  font-size:12px;color:rgba(255,255,255,.7);
  backdrop-filter:blur(12px);
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;white-space:nowrap;z-index:30;
}
#kb-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.kb-key{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:4px;padding:1px 6px;font-size:11px;
  font-family:'JetBrains Mono',monospace;color:#fff;
  margin:0 2px;
}

/* ── Step count ── */
#step-count{
  position:absolute;top:14px;right:14px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:rgba(255,255,255,.3);
  background:rgba(0,0,0,.4);border-radius:10px;padding:4px 10px;
  opacity:0;transition:opacity .4s;z-index:10;
}
#step-count.show{opacity:1}
</style>
</head>
<body>
<div id="shell">

  <!-- MacBook bezel -->
  <div id="macbook">
  <div id="macbook-lid">
    <div id="macbook-camera"></div>
    <div id="macbook-screen">
  <!-- macOS window -->
  <div id="mac-window">
    <!-- Title bar -->
    <div id="title-bar">
      <div class="traffic-dot" style="background:#ff5f57"></div>
      <div class="traffic-dot" style="background:#febc2e"></div>
      <div class="traffic-dot" style="background:#28c840"></div>
      <div id="title-text">DOC-SCRIBE<span class="title-dot">.AI</span> — Product Overview</div>
    </div>

    <!-- Video -->
    <div id="video-wrap">
      <video id="main-video" src="uploads/Product Overview v3.mp4"
        playsinline preload="metadata"></video>

      <!-- Overlays -->
      <div id="flash"></div>

      <div id="chapter-pill">
        <span class="pill-step" id="pill-step">01</span>
        <span class="pill-name" id="pill-name">Dashboard</span>
      </div>
      <div id="step-count"></div>

      <div id="subtitle-bar">
        <div id="subtitle-inner">
          <span id="subtitle-icon"></span>
          <span id="subtitle-text"></span>
        </div>
      </div>

      <div id="kb-toast"><span id="kb-msg"></span></div>

      <div id="progress-area">
        <div id="progress-fill"></div>
      </div>

      <!-- Intro -->
      <div id="intro">
        <!-- Blurred dashboard bg -->
        <div style="position:absolute;inset:0;
          background:url('uploads/Dashboard.png') center/cover no-repeat;
          filter:blur(18px) brightness(0.25) saturate(1.4);
          transform:scale(1.08);
        "></div>
        <!-- Dark gradient overlay -->
        <div style="position:absolute;inset:0;
          background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,rgba(0,8,20,0.82) 100%);
        "></div>
        <!-- Green glow orb -->
        <div style="position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
          width:500px;height:500px;border-radius:50%;
          background:radial-gradient(circle,rgba(0,230,118,0.18) 0%,transparent 70%);
          animation:glowPulse 3s ease-in-out infinite;
        "></div>

        <!-- Content -->
        <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:0 24px;">
          <!-- Logo -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <rect width="36" height="36" rx="9" fill="rgba(0,230,118,0.15)" stroke="rgba(0,230,118,0.4)" stroke-width="1"/>
              <path d="M9 11h18M9 16h13M9 21h15M9 26h10" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>
              <circle cx="27" cy="24" r="5" fill="#00e676" opacity="0.9"/>
              <path d="M25 24l1.5 1.5L28.5 23" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span style="font-size:28px;font-weight:800;color:#fff;letter-spacing:-.03em;">DOC-SCRIBE<span style="color:#00e676">.AI</span></span>
          </div>

          <!-- Value prop -->
          <div style="font-size:15px;font-weight:400;color:rgba(255,255,255,0.55);max-width:340px;line-height:1.6;">
            From scattered files to structured clarity —<br/>in one intelligent platform.
          </div>

          <!-- Play button -->
          <div class="intro-btn" style="margin-top:8px;">
            <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
              <path d="M8 5l18 9-18 9V5z" fill="white"/>
            </svg>
          </div>

          <!-- Feature chips -->
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:460px;margin-top:4px;">
            <span style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(0,230,118,0.25);color:rgba(0,230,118,0.85);background:rgba(0,230,118,0.07);">📊 Dashboard</span>
            <span style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(0,230,118,0.25);color:rgba(0,230,118,0.85);background:rgba(0,230,118,0.07);">📁 My Box</span>
            <span style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(0,230,118,0.25);color:rgba(0,230,118,0.85);background:rgba(0,230,118,0.07);">🗂️ Categories</span>
            <span style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(0,230,118,0.25);color:rgba(0,230,118,0.85);background:rgba(0,230,118,0.07);">🔗 Shared Files</span>
            <span style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(0,230,118,0.25);color:rgba(0,230,118,0.85);background:rgba(0,230,118,0.07);">🏷️ File Tags</span>
            <span style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(0,230,118,0.25);color:rgba(0,230,118,0.85);background:rgba(0,230,118,0.07);">🔍 Audit Trail</span>

        </div>
      </div>
    </div>
  </div>

    </div><!-- /mac-window -->
    </div><!-- /macbook-screen -->
  </div><!-- /macbook-lid -->
  <div id="macbook-base"></div>
  <div id="macbook-foot"></div>
  </div><!-- /macbook -->

  <!-- Controls -->
  <div id="controls">
    <button class="cbtn" id="btn-play">
      <svg id="play-icon" width="12" height="12" viewBox="0 0 14 14" fill="none">
        <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>

    <div id="cur-chapter"></div>

        <path d="M2 5h2l3-3v10L4 9H2V5z" fill="currentColor"/>
        <path d="M10 4a4 4 0 0 1 0 6M8.5 5.5a2 2 0 0 1 0 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

    <button class="cbtn" id="btn-fs">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none">
        <path d="M2 5V2h3M9 2h3v3M12 9v3H9M5 12H2V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Chapter strip -->
  <div id="chapter-strip"></div>
</div>

<script>
const CHAPTERS = [
  { t:3,  label:'Dashboard',         icon:'📊', color:'#00e676' },
  { t:10, label:'My Box',            icon:'📁', color:'#00b4d8' },
  { t:12, label:'Manage Categories', icon:'🗂️', color:'#f77f00' },
  { t:15, label:'Collections',       icon:'📚', color:'#a855f7' },
  { t:18, label:'Shared Files',      icon:'🔗', color:'#00e676' },
  { t:20, label:'Upload File',       icon:'⬆️', color:'#00b4d8' },
  { t:25, label:'Trash',             icon:'🗑️', color:'#e63946' },
  { t:27, label:'File Tags',         icon:'🏷️', color:'#f77f00' },
  { t:29, label:'Audit Trail',       icon:'🔍', color:'#a855f7' },
  { t:33, label:'Dark / Light Mode', icon:'☀️', color:'#ffd166' },
  { t:37, label:'Multi-Language',    icon:'🌐', color:'#00e676' },
];

const video       = document.getElementById('main-video');
const progressArea= document.getElementById('progress-area');
const progressFill= document.getElementById('progress-fill');
const pill        = document.getElementById('chapter-pill');
const pillStep    = document.getElementById('pill-step');
const pillName    = document.getElementById('pill-name');
const stepCount   = document.getElementById('step-count');
const subtitleBar = document.getElementById('subtitle-bar');
const subtitleIcon= document.getElementById('subtitle-icon');
const subtitleText= document.getElementById('subtitle-text');
const flashEl     = document.getElementById('flash');
const btnPlay     = document.getElementById('btn-play');
const btnRestart  = document.getElementById('btn-restart');
const btnMute     = document.getElementById('btn-mute');
const btnFs       = document.getElementById('btn-fs');
const timeDisplay = document.getElementById('time-display');
const curChapter  = document.getElementById('cur-chapter');
const strip       = document.getElementById('chapter-strip');
const intro       = document.getElementById('intro');
const macWindow   = document.getElementById('mac-window');

let pillTimer = null, subTimer = null, curIdx = -1;

// ── Responsive sizing ────────────────────────────────────────────────────
function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const controlsH = 44;
  const stripH    = 60;
  const bezelPad  = 10; // lid padding each side
  const baseH     = 18; // lid base + foot
  const titleBarH = 38;
  const availH = vh - controlsH - stripH - baseH - 60;
  const availW = vw - 80;
  const maxW = Math.min(availW, (availH - titleBarH) * (16/9));
  const winW = Math.floor(maxW);
  const videoH = Math.floor(winW * 9/16);
  macWindow.style.width = winW + 'px';
  document.getElementById('video-wrap').style.height = videoH + 'px';
  document.getElementById('macbook-lid').style.width = (winW + bezelPad*2) + 'px';
  document.getElementById('macbook-base').style.width = (winW + bezelPad*2 + 20) + 'px';
  document.getElementById('controls').style.width = (winW + bezelPad*2) + 'px';
  document.getElementById('chapter-strip').style.maxWidth = (winW + bezelPad*2) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Build chapter dots + strip ───────────────────────────────────────────
video.addEventListener('loadedmetadata', () => {
  timeDisplay.textContent = `0:00 / ${fmt(video.duration)}`;
  stepCount.textContent = `1 / ${CHAPTERS.length}`;

  CHAPTERS.forEach((ch, i) => {
    const dot = document.createElement('div');
    dot.className = 'cdot';
    dot.style.left = `${(ch.t / video.duration) * 100}%`;
    dot.title = ch.label;
    dot.addEventListener('click', e => { e.stopPropagation(); seek(ch.t); });
    progressArea.appendChild(dot);

    const btn = document.createElement('div');
    btn.className = 'cstep';
    btn.dataset.idx = i;
    btn.innerHTML = `<span>${ch.icon}</span><span>${ch.label}</span><span class="cstep-time">${fmt(ch.t)}</span>`;
    btn.addEventListener('click', () => { seek(ch.t); video.play(); });
    strip.appendChild(btn);
  });
});

function seek(t) { video.currentTime = t; }

// ── Chapter detection ────────────────────────────────────────────────────
function getIdx(t) {
  let idx = 0;
  for (let i = 0; i < CHAPTERS.length; i++) {
    if (t >= CHAPTERS[i].t) idx = i; else break;
  }
  return idx;
}

function onChapterChange(idx) {
  const ch = CHAPTERS[idx];

  // Flash
  flashEl.classList.remove('pop');
  void flashEl.offsetWidth; // reflow
  flashEl.style.background = `linear-gradient(135deg,${ch.color}55,rgba(255,255,255,.2))`;
  flashEl.classList.add('pop');

  // Pill
  pillStep.textContent = String(idx + 1).padStart(2, '0');
  pillStep.style.color = ch.color;
  pillStep.style.background = ch.color + '22';
  pillName.textContent = ch.label;
  pill.classList.add('show');
  stepCount.textContent = `${idx + 1} / ${CHAPTERS.length}`;
  stepCount.classList.add('show');
  clearTimeout(pillTimer);
  pillTimer = setTimeout(() => {
    pill.classList.remove('show');
    stepCount.classList.remove('show');
  }, 3500);


}

// ── timeupdate ───────────────────────────────────────────────────────────
video.addEventListener('timeupdate', () => {
  const t = video.currentTime, dur = video.duration || 1;
  progressFill.style.width = `${(t / dur) * 100}%`;
  timeDisplay.textContent = `${fmt(t)} / ${fmt(dur)}`;

  const idx = getIdx(t);
  curChapter.textContent = `${CHAPTERS[idx].icon}  ${CHAPTERS[idx].label}`;
  document.querySelectorAll('.cstep').forEach((el, i) => el.classList.toggle('active', i === idx));

  if (idx !== curIdx) { curIdx = idx; onChapterChange(idx); }
});

// ── Scrub ────────────────────────────────────────────────────────────────
let scrubbing = false;
progressArea.addEventListener('mousedown', e => { scrubbing = true; doScrub(e); });
window.addEventListener('mousemove', e => { if (scrubbing) doScrub(e); });
window.addEventListener('mouseup', () => { scrubbing = false; });
function doScrub(e) {
  const r = progressArea.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * video.duration;
}

// ── Playback ─────────────────────────────────────────────────────────────
function toggle() { video.paused ? video.play() : video.pause(); }
function updateIcon() {
  document.getElementById('play-icon').innerHTML = video.paused
    ? '<path d="M3 2l9 5-9 5V2z" fill="currentColor"/>'
    : '<rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/>';
}
btnPlay.addEventListener('click', toggle);
video.addEventListener('play', () => { updateIcon(); intro.classList.add('out'); });
video.addEventListener('pause', updateIcon);
intro.addEventListener('click', () => video.play());
btnRestart.addEventListener('click', () => { video.currentTime = 0; video.play(); });
btnMute.addEventListener('click', () => {
  video.muted = !video.muted;
  document.getElementById('vol-icon').style.opacity = video.muted ? 0.3 : 1;
});
btnFs.addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else macWindow.requestFullscreen();
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggle(); }
  if (e.code === 'ArrowRight') video.currentTime = Math.min(video.duration, video.currentTime + 3);
  if (e.code === 'ArrowLeft')  video.currentTime = Math.max(0, video.currentTime - 3);
  if (e.key  === '0')          video.currentTime = 0;
});

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── Keyboard toast ────────────────────────────────────────────────────────
const kbToast = document.getElementById('kb-toast');
const kbMsg   = document.getElementById('kb-msg');
let kbTimer   = null;

function showToast(html) {
  kbMsg.innerHTML = html;
  kbToast.classList.add('show');
  clearTimeout(kbTimer);
  kbTimer = setTimeout(() => kbToast.classList.remove('show'), 1800);
}

// Show hints on hover over controls
document.getElementById('controls').addEventListener('mouseenter', () => {
  showToast(`<span class="kb-key">Space</span> Play/Pause &nbsp;·&nbsp; <span class="kb-key">←</span><span class="kb-key">→</span> Skip 3s &nbsp;·&nbsp; <span class="kb-key">0</span> Restart`);
});
document.getElementById('btn-play').addEventListener('mouseenter',    () => showToast(`<span class="kb-key">Space</span> Play / Pause`));
document.getElementById('btn-restart').addEventListener('mouseenter', () => showToast(`<span class="kb-key">0</span> Restart from beginning`));
document.getElementById('btn-mute').addEventListener('mouseenter',    () => showToast(`<span class="kb-key">M</span> Mute / Unmute`));
document.getElementById('btn-fs').addEventListener('mouseenter',      () => showToast(`<span class="kb-key">F</span> Fullscreen`));
document.getElementById('progress-area').addEventListener('mouseenter',() => showToast(`Click or drag to seek`));

// Extra keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.code === 'KeyM') { video.muted = !video.muted; document.getElementById('vol-icon').style.opacity = video.muted ? 0.3 : 1; showToast(video.muted ? '🔇 Muted' : '🔊 Unmuted'); }
  if (e.code === 'KeyF') { if (document.fullscreenElement) document.exitFullscreen(); else macWindow.requestFullscreen(); }
});
</script>
</body>
