<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DocScribe — Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'DM Sans',system-ui,sans-serif}

/* ── Full-screen stage ── */
#stage{
  position:relative;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}

#main-video{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
}

/* ── Overlay ── */
#overlay{
  position:absolute;inset:0;
  pointer-events:none;
  overflow:hidden;
}

/* ── Chapter pill (top center) ── */
#chapter-pill{
  position:absolute;top:24px;left:50%;transform:translateX(-50%) translateY(-8px);
  display:flex;align-items:center;gap:10px;
  background:rgba(6,8,16,0.78);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:50px;padding:9px 20px;
  backdrop-filter:blur(14px);
  opacity:0;transition:opacity 0.5s,transform 0.5s;
  white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
#chapter-pill.show{opacity:1;transform:translateX(-50%) translateY(0)}
#chapter-num{
  font-family:'DM Mono',monospace;font-size:11px;
  color:oklch(68% 0.19 248);letter-spacing:.14em;text-transform:uppercase;
}
#chapter-sep{color:rgba(255,255,255,0.2);font-size:12px}
#chapter-title{font-size:14px;font-weight:600;color:#eef2ff;letter-spacing:-.01em}

/* ── Step counter (top right) ── */
#step-badge{
  position:absolute;top:24px;right:24px;
  background:oklch(68% 0.19 248 / 0.15);
  border:1px solid oklch(68% 0.19 248 / 0.4);
  color:oklch(78% 0.14 248);
  font-size:12px;font-weight:600;font-family:'DM Mono',monospace;
  border-radius:20px;padding:6px 14px;
  opacity:0;transition:opacity 0.5s;letter-spacing:.06em;
  backdrop-filter:blur(10px);
}
#step-badge.show{opacity:1}

/* ── Callout bubble ── */
.callout{
  position:absolute;
  background:rgba(6,8,18,0.85);
  border:1.5px solid oklch(68% 0.19 248 / 0.55);
  border-radius:14px;padding:14px 18px;
  font-size:14px;font-weight:500;color:#eef2ff;
  max-width:280px;line-height:1.55;
  backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(74,143,255,0.18);
  opacity:0;
  transition:opacity 0.45s,transform 0.45s;
  transform:translateY(10px);
  pointer-events:none;
}
.callout.show{opacity:1;transform:translateY(0)}
.callout-label{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:oklch(68% 0.19 248);
  font-size:11px;font-weight:700;color:#fff;
  margin-right:8px;flex-shrink:0;vertical-align:middle;
}
.callout-icon{font-size:16px;margin-right:6px;vertical-align:middle}

/* ── Highlight ring ── */
.highlight-ring{
  position:absolute;
  border:2px solid oklch(68% 0.19 248);
  border-radius:10px;
  box-shadow:0 0 0 4px oklch(68% 0.19 248 / 0.15),0 0 20px oklch(68% 0.19 248 / 0.3);
  opacity:0;transition:opacity 0.4s;
  pointer-events:none;
  animation:ringPulse 2s ease-in-out infinite;
}
.highlight-ring.show{opacity:1}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 4px oklch(68% 0.19 248 / 0.15),0 0 20px oklch(68% 0.19 248 / 0.3)}
  50%{box-shadow:0 0 0 8px oklch(68% 0.19 248 / 0.08),0 0 32px oklch(68% 0.19 248 / 0.5)}
}

/* ── Progress bar ── */
#progress-area{
  position:absolute;bottom:0;left:0;right:0;
  height:48px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  display:flex;align-items:flex-end;
  padding-bottom:0;
  opacity:0;transition:opacity .3s;
}
#stage:hover #progress-area, #progress-area.always{opacity:1}

#progress-track{
  position:relative;width:100%;height:3px;
  background:rgba(255,255,255,0.15);
  cursor:pointer;transition:height .2s;
  margin-bottom:0;
}
#progress-track:hover{height:5px}
#progress-fill{
  height:100%;
  background:linear-gradient(90deg,oklch(68% 0.19 248),oklch(66% 0.17 290));
  width:0%;pointer-events:none;
}
.ch-dot{
  position:absolute;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  border:1.5px solid rgba(255,255,255,0.9);
  cursor:pointer;z-index:2;
  transition:transform .2s;
}
.ch-dot:hover{transform:translateY(-50%) scale(1.8)}

/* ── Controls overlay (bottom) ── */
#controls{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:10px;
  padding:10px 16px 14px;
  pointer-events:all;
}
.ctrl-btn{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:#eef2ff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
  backdrop-filter:blur(8px);
}
.ctrl-btn:hover{background:rgba(255,255,255,0.18)}
#time-disp{
  font-family:'DM Mono',monospace;font-size:12px;
  color:rgba(238,242,255,0.6);white-space:nowrap;flex-shrink:0;
}
#ch-name{
  flex:1;font-size:13px;color:rgba(238,242,255,0.5);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── Chapter panel ── */
#chapter-list{
  position:absolute;bottom:58px;left:0;right:0;
  display:flex;gap:8px;padding:0 14px;
  overflow-x:auto;scrollbar-width:none;
  pointer-events:all;
  opacity:0;transition:opacity .3s;
}
#stage:hover #chapter-list, #chapter-list.always{opacity:1}
#chapter-list::-webkit-scrollbar{display:none}
.ch-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;flex-shrink:0;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;transition:all .2s;
  font-size:12px;color:rgba(238,242,255,0.55);
  backdrop-filter:blur(10px);white-space:nowrap;
}
.ch-btn:hover{background:rgba(255,255,255,0.1);color:#eef2ff}
.ch-btn.active{
  background:oklch(68% 0.19 248 / 0.15);
  border-color:oklch(68% 0.19 248 / 0.5);
  color:oklch(80% 0.14 248);
}
.ch-btn-time{font-family:'DM Mono',monospace;font-size:10px;opacity:.5}

/* ── Intro overlay ── */
#intro-overlay{
  position:absolute;inset:0;
  background:rgba(6,8,16,0.75);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  backdrop-filter:blur(4px);
  transition:opacity .5s;
  pointer-events:all;cursor:pointer;
}
#intro-overlay.hidden{opacity:0;pointer-events:none}
#play-big{
  width:72px;height:72px;border-radius:50%;
  background:oklch(68% 0.19 248);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 48px oklch(68% 0.19 248 / 0.5);
  transition:transform .2s;
}
#play-big:hover{transform:scale(1.1)}
#intro-title{font-size:22px;font-weight:700;color:#eef2ff;letter-spacing:-.02em}
#intro-sub{font-size:15px;color:rgba(238,242,255,0.5);font-weight:300}
</style>
</head>
<body>
<div id="stage">
  <video id="main-video"
    src="uploads/Product Overview v3.mp4"
    playsinline preload="metadata">
  </video>

  <!-- Overlay elements -->
  <div id="overlay">
    <div id="chapter-pill">
      <span id="chapter-num">Step 01</span>
      <span id="chapter-sep">·</span>
      <span id="chapter-title">Introduction</span>
    </div>
    <div id="step-badge">1 / 5</div>
    <!-- callouts and rings injected by JS -->
  </div>

  <!-- Progress + controls -->
  <div id="progress-area" class="always">
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
  </div>

  <div id="chapter-list" class="always"></div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-play">
      <svg id="play-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-restart">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M2 7A5 5 0 1 0 7 2V0L3.5 3 7 6V4a3 3 0 1 1-3 3H2z" fill="currentColor"/>
      </svg>
    </button>
    <div id="time-disp">0:00 / 0:00</div>
    <div id="ch-name"></div>
    <button class="ctrl-btn" id="btn-mute">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="vol-icon">
        <path d="M2 5h2l3-3v10L4 9H2V5z" fill="currentColor"/>
        <path d="M10 4a4 4 0 0 1 0 6M8.5 5.5a2 2 0 0 1 0 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-fs">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M2 5V2h3M9 2h3v3M12 9v3H9M5 12H2V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Intro splash -->
  <div id="intro-overlay">
    <div id="play-big">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M8 5l18 9-18 9V5z" fill="white"/>
      </svg>
    </div>
    <div id="intro-title">DocScribe — Product Tutorial</div>
    <div id="intro-sub">Click to play · Under 1 minute</div>
  </div>
</div>

<script>
// ─── Chapter definitions ───────────────────────────────────────────────────
// Adjust `t` (seconds) to match your actual video content
const CHAPTERS = [
  {
    t: 0,
    label: 'Welcome to DocScribe',
    icon: '👋',
    callout: 'DocScribe turns your meetings into structured, actionable documents — automatically.',
    calloutAnchor: 'top-center',
    highlight: null,
  },
  {
    t: 10,
    label: 'Start Recording',
    icon: '🎙️',
    callout: 'Hit Record to capture your meeting from any platform — Zoom, Teams, or in-person.',
    calloutAnchor: 'bottom-left',
    highlight: null,
  },
  {
    t: 25,
    label: 'Live Transcription',
    icon: '📝',
    callout: 'Every word transcribed in real time. Speaker labels applied automatically.',
    calloutAnchor: 'top-right',
    highlight: null,
  },
  {
    t: 40,
    label: 'AI Summary & Actions',
    icon: '✨',
    callout: 'DocScribe extracts key decisions, action items, and next steps — ready to share.',
    calloutAnchor: 'bottom-right',
    highlight: null,
  },
  {
    t: 52,
    label: 'Share Instantly',
    icon: '🚀',
    callout: 'One click sends the full brief to Slack, Notion, Jira, or email. Zero formatting needed.',
    calloutAnchor: 'top-left',
    highlight: null,
  },
];

// ─── DOM refs ──────────────────────────────────────────────────────────────
const video        = document.getElementById('main-video');
const overlay      = document.getElementById('overlay');
const progressTrack= document.getElementById('progress-track');
const progressFill = document.getElementById('progress-fill');
const chapterPill  = document.getElementById('chapter-pill');
const chapterNum   = document.getElementById('chapter-num');
const chapterTitle = document.getElementById('chapter-title');
const stepBadge    = document.getElementById('step-badge');
const btnPlay      = document.getElementById('btn-play');
const btnRestart   = document.getElementById('btn-restart');
const btnMute      = document.getElementById('btn-mute');
const btnFs        = document.getElementById('btn-fs');
const timeDisp     = document.getElementById('time-disp');
const chName       = document.getElementById('ch-name');
const chapterList  = document.getElementById('chapter-list');
const introOverlay = document.getElementById('intro-overlay');

let calloutEls = [];
let ringEls    = [];
let pillTimer  = null;
let currentIdx = -1;

// ─── Callout anchor positions ──────────────────────────────────────────────
function anchorStyle(anchor) {
  const styles = {
    'top-center':  { top:'80px', left:'50%', transform:'translateX(-50%)' },
    'top-left':    { top:'80px', left:'20px' },
    'top-right':   { top:'80px', right:'20px' },
    'bottom-left': { bottom:'80px', left:'20px' },
    'bottom-right':{ bottom:'80px', right:'20px' },
  };
  return styles[anchor] || styles['top-center'];
}

// ─── Build overlays after metadata ────────────────────────────────────────
video.addEventListener('loadedmetadata', () => {
  const dur = video.duration;
  timeDisp.textContent = `0:00 / ${fmt(dur)}`;
  stepBadge.textContent = `1 / ${CHAPTERS.length}`;

  CHAPTERS.forEach((ch, i) => {
    // Progress dot
    const dot = document.createElement('div');
    dot.className = 'ch-dot';
    dot.style.left = `${(ch.t / dur) * 100}%`;
    dot.title = ch.label;
    dot.addEventListener('click', e => { e.stopPropagation(); video.currentTime = ch.t; video.play(); });
    progressTrack.appendChild(dot);

    // Callout
    const box = document.createElement('div');
    box.className = 'callout';
    Object.assign(box.style, anchorStyle(ch.calloutAnchor));
    box.innerHTML = `<span class="callout-icon">${ch.icon}</span>${ch.callout}`;
    overlay.appendChild(box);
    calloutEls.push(box);

    // Highlight ring
    if (ch.highlight) {
      const ring = document.createElement('div');
      ring.className = 'highlight-ring';
      Object.assign(ring.style, {
        top: ch.highlight.top,
        left: ch.highlight.left,
        width: ch.highlight.width,
        height: ch.highlight.height,
      });
      overlay.appendChild(ring);
      ringEls.push({ el: ring, idx: i });
    } else {
      ringEls.push(null);
    }

    // Chapter list button
    const btn = document.createElement('div');
    btn.className = 'ch-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<span>${ch.icon}</span><span>${ch.label}</span><span class="ch-btn-time">${fmt(ch.t)}</span>`;
    btn.addEventListener('click', () => { video.currentTime = ch.t; video.play(); });
    chapterList.appendChild(btn);
  });
});

// ─── Get current chapter index ─────────────────────────────────────────────
function getChapterIdx(t) {
  let idx = 0;
  for (let i = 0; i < CHAPTERS.length; i++) {
    if (t >= CHAPTERS[i].t) idx = i;
    else break;
  }
  return idx;
}

// ─── Show chapter pill briefly ─────────────────────────────────────────────
function flashPill(idx) {
  const ch = CHAPTERS[idx];
  chapterNum.textContent  = `Step ${String(idx+1).padStart(2,'0')}`;
  chapterTitle.textContent = ch.label;
  chapterPill.classList.add('show');
  stepBadge.textContent = `${idx+1} / ${CHAPTERS.length}`;
  stepBadge.classList.add('show');
  clearTimeout(pillTimer);
  pillTimer = setTimeout(() => {
    chapterPill.classList.remove('show');
    stepBadge.classList.remove('show');
  }, 3500);
}

// ─── timeupdate ────────────────────────────────────────────────────────────
video.addEventListener('timeupdate', () => {
  const t   = video.currentTime;
  const dur = video.duration || 1;

  progressFill.style.width = `${(t / dur) * 100}%`;
  timeDisp.textContent = `${fmt(t)} / ${fmt(dur)}`;

  const idx = getChapterIdx(t);
  const ch  = CHAPTERS[idx];

  chName.textContent = `${ch.icon}  ${ch.label}`;

  // Highlight active chapter button
  document.querySelectorAll('.ch-btn').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // On chapter change
  if (idx !== currentIdx) {
    currentIdx = idx;
    flashPill(idx);

    // Callouts
    calloutEls.forEach((el, i) => el.classList.toggle('show', i === idx));

    // Rings
    ringEls.forEach(r => { if (r) r.el.classList.toggle('show', r.idx === idx); });
  }
});

// ─── Scrub ─────────────────────────────────────────────────────────────────
let scrubbing = false;
progressTrack.addEventListener('mousedown', e => { scrubbing = true; scrub(e); });
window.addEventListener('mousemove',  e => { if (scrubbing) scrub(e); });
window.addEventListener('mouseup',    () => { scrubbing = false; });
function scrub(e) {
  const r = progressTrack.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  video.currentTime = p * video.duration;
}

// ─── Controls ─────────────────────────────────────────────────────────────
function updateIcon() {
  document.getElementById('play-icon').innerHTML = video.paused
    ? '<path d="M3 2l9 5-9 5V2z" fill="currentColor"/>'
    : '<rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/>';
}
btnPlay.addEventListener('click', toggle);
video.addEventListener('play',  () => { updateIcon(); introOverlay.classList.add('hidden'); });
video.addEventListener('pause', updateIcon);
introOverlay.addEventListener('click', () => video.play());

function toggle() { video.paused ? video.play() : video.pause(); }

btnRestart.addEventListener('click', () => { video.currentTime = 0; video.play(); });

btnMute.addEventListener('click', () => {
  video.muted = !video.muted;
  document.getElementById('vol-icon').style.opacity = video.muted ? 0.3 : 1;
});

btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) document.getElementById('stage').requestFullscreen();
  else document.exitFullscreen();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggle(); }
  if (e.code === 'ArrowRight') video.currentTime = Math.min(video.duration, video.currentTime + 5);
  if (e.code === 'ArrowLeft')  video.currentTime = Math.max(0, video.currentTime - 5);
  if (e.key  === '0')          video.currentTime = 0;
});

// ─── Helpers ───────────────────────────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}
</script>
</body>
</html>
