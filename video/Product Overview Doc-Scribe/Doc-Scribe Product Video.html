<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #060810; }

<body>
<div id="root"></div>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel">
// ─── Palette ───────────────────────────────────────────────────────────────
const C = {
  bg:     '#060810',
  bg2:    '#0d1120',
  blue:   'oklch(68% 0.19 248)',
  purple: 'oklch(66% 0.17 290)',
  teal:   'oklch(70% 0.15 195)',
  white:  '#eef2ff',
  dim:    'rgba(238,242,255,0.45)',
  grid:   'rgba(100,130,255,0.05)',
};

const FONT = '"DM Sans", system-ui, sans-serif';
const MONO = '"DM Mono", monospace';

// ─── Helpers ───────────────────────────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
function fadeIn(lt, dur=0.5){ return clamp(lt/dur,0,1); }
function fadeOut(lt, total, dur=0.5){ return 1-clamp((lt-(total-dur))/dur,0,1); }
function presence(lt, total, inD=0.5, outD=0.4){ return Math.min(fadeIn(lt,inD), fadeOut(lt,total,outD)); }

// ─── Shared: Grid BG ──────────────────────────────────────────────────────
function GridBG({ opacity=1, color=C.grid }){
  return (
    <div style={{position:'absolute',inset:0,opacity,
      backgroundImage:`linear-gradient(${color} 1px,transparent 1px),linear-gradient(90deg,${color} 1px,transparent 1px)`,
      backgroundSize:'60px 60px'}} />
  );
}

// ─── Shared: Glow Orb ─────────────────────────────────────────────────────
function GlowOrb({ x=640, y=360, r=400, color='oklch(60% 0.2 248)', opacity=0.18 }){
  return (
    <div style={{
      position:'absolute',
      left:x-r, top:y-r, width:r*2, height:r*2,
      borderRadius:'50%',
      background:`radial-gradient(circle, ${color} 0%, transparent 70%)`,
      opacity, pointerEvents:'none'
    }}/>
  );
}

// ─── Scene 1: Opening Hook ─────────────────────────────────────────────────
// 0 – 10s: "Your meetings are full of gold. It's buried."
function Scene1(){
  const t = useTime();
  const lt = t; // local, scene starts at 0

  const tagOp = clamp((lt-0.3)/0.8,0,1) * (1 - clamp((lt-7)/0.8,0,1));
  const heroOp = clamp((lt-1.5)/1,0,1) * (1 - clamp((lt-7.5)/0.7,0,1));
  const sub1Op = clamp((lt-3)/0.8,0,1) * (1 - clamp((lt-7.5)/0.7,0,1));
  const sub2Op = clamp((lt-4.5)/0.8,0,1) * (1 - clamp((lt-7.5)/0.7,0,1));

  const heroY = lerp(30, 0, Easing.easeOutCubic(clamp((lt-1.5)/1,0,1)));

  return (
    <g>
      <GridBG opacity={clamp(lt/2,0,1)*0.6}/>
      <GlowOrb x={640} y={400} r={520} color='oklch(55% 0.22 248)' opacity={0.15}/>
      <GlowOrb x={200} y={200} r={300} color='oklch(55% 0.18 285)' opacity={0.10}/>

      {/* Tag */}
      <div style={{
        position:'absolute', top:240, left:0, right:0, textAlign:'center',
        opacity:tagOp, fontFamily:MONO, fontSize:13, color:C.blue, letterSpacing:'0.22em', textTransform:'uppercase'
      }}>Doc-Scribe presents</div>

      {/* Hero */}
      <div style={{
        position:'absolute', top:280, left:0, right:0, textAlign:'center',
        opacity:heroOp, transform:`translateY(${heroY}px)`
      }}>
        <div style={{fontFamily:FONT,fontSize:72,fontWeight:700,color:C.white,lineHeight:1.1,letterSpacing:'-0.02em'}}>
          Your meetings are<br/>full of <span style={{color:C.blue}}>gold.</span>
        </div>
      </div>

      {/* Subs */}
      <div style={{
        position:'absolute', top:440, left:0, right:0, textAlign:'center',
        opacity:sub1Op, fontFamily:FONT, fontSize:28, fontWeight:300, color:C.dim
      }}>It's buried in notes no one reads.</div>
      <div style={{
        position:'absolute', top:490, left:0, right:0, textAlign:'center',
        opacity:sub2Op, fontFamily:FONT, fontSize:28, fontWeight:300, color:C.dim
      }}>Transcripts no one formats. Action items no one tracks.</div>
    </g>
  );
}

// ─── Scene 2: The Problem ──────────────────────────────────────────────────
// 10 – 24s
function Scene2(){
  const t = useTime();
  const lt = t - 10;
  if(lt < 0) return null;

  const bg = clamp(lt/1.2,0,1);
  const end = 14;

  // Floating chaotic notes
  const notes = [
    { x:150, y:180, rot:-8,  text:'@ john re: Q2\nfollow up??', delay:0.3 },
    { x:420, y:120, rot:3,   text:'action items\n(TBD)', delay:0.6 },
    { x:680, y:200, rot:-4,  text:'see slack thread\n#general', delay:0.4 },
    { x:900, y:140, rot:6,   text:'budget approved?\ncheck w/ finance', delay:0.8 },
    { x:1050,y:260, rot:-7,  text:'roadmap v3\n(old version?)', delay:0.5 },
    { x:200, y:380, rot:5,   text:'URGENT – client\ncall notes lost', delay:0.9 },
    { x:500, y:340, rot:-5,  text:'meeting 10/4\nno summary sent', delay:0.7 },
    { x:760, y:390, rot:4,   text:'30min recording\nnever listened to', delay:0.3 },
    { x:980, y:370, rot:-3,  text:'who was supposed\nto write this up?', delay:1.0 },
    { x:320, y:520, rot:7,   text:'TODO: transcript\n(3 weeks ago)', delay:0.6 },
    { x:600, y:500, rot:-6,  text:'lost in email\n😬', delay:0.4 },
    { x:850, y:500, rot:3,   text:'Notes doc:\n[empty]', delay:0.8 },
  ];

  const titleOp = clamp((lt-1)/0.8,0,1) * (1 - clamp((lt-10)/0.8,0,1));
  const titleY = lerp(20,0, Easing.easeOutCubic(clamp((lt-1)/0.8,0,1)));

  return (
    <g>
      <GridBG opacity={0.5}/>
      <GlowOrb x={640} y={360} r={400} color='oklch(50% 0.15 10)' opacity={0.12}/>

      {notes.map((n,i) => {
        const appear = clamp((lt-n.delay)/0.5,0,1);
        const drift = lt * (i%2===0?1:-1) * 0.4;
        const wiggle = Math.sin(lt*0.8 + i*1.2) * 3;
        return (
          <div key={i} style={{
            position:'absolute', left:n.x, top:n.y+drift*0.3,
            transform:`rotate(${n.rot+wiggle}deg) scale(${appear})`,
            opacity: appear * 0.85,
            background:'rgba(255,255,255,0.06)',
            border:'1px solid rgba(255,255,255,0.1)',
            borderRadius:8, padding:'10px 14px',
            fontFamily:MONO, fontSize:12.5, color:'rgba(238,242,255,0.7)',
            lineHeight:1.5, whiteSpace:'pre',
            backdropFilter:'blur(4px)',
            transformOrigin:'center',
          }}>{n.text}</div>
        );
      })}

      <div style={{
        position:'absolute', bottom:80, left:0, right:0, textAlign:'center',
        opacity:titleOp, transform:`translateY(${titleY}px)`
      }}>
        <div style={{fontFamily:FONT, fontSize:48, fontWeight:700, color:C.white, letterSpacing:'-0.02em'}}>
          Documentation is <span style={{color:'oklch(65% 0.2 15)'}}>broken.</span>
        </div>
        <div style={{fontFamily:FONT, fontSize:22, fontWeight:300, color:C.dim, marginTop:12}}>
          Hours of conversation. Zero usable output.
        </div>
      </div>
    </g>
  );
}

// ─── Scene 3: Solution Reveal ──────────────────────────────────────────────
// 24 – 38s
function Scene3(){
  const t = useTime();
  const lt = t - 24;
  if(lt < 0) return null;

  const flashOp = Math.max(0, 1 - lt*3);
  const logoOp = clamp((lt-0.6)/1.2,0,1) * (1 - clamp((lt-11.5)/0.8,0,1));
  const tagOp  = clamp((lt-1.8)/1,0,1)   * (1 - clamp((lt-11.5)/0.8,0,1));
  const desc1Op = clamp((lt-3)/0.8,0,1)  * (1 - clamp((lt-11.5)/0.7,0,1));
  const desc2Op = clamp((lt-4.2)/0.8,0,1)* (1 - clamp((lt-11.5)/0.7,0,1));

  const logoScale = lerp(0.7, 1, Easing.easeOutBack(clamp((lt-0.6)/1.2,0,1)));

  // Animated underline
  const lineW = clamp((lt-2.2)/0.8,0,1) * 340;

  return (
    <g>
      {/* Flash */}
      <div style={{position:'absolute',inset:0,background:'white',opacity:flashOp,pointerEvents:'none'}}/>

      <GridBG opacity={0.6}/>
      <GlowOrb x={640} y={340} r={550} color='oklch(60% 0.22 248)' opacity={0.2}/>
      <GlowOrb x={400} y={200} r={300} color='oklch(60% 0.18 290)' opacity={0.12}/>
      <GlowOrb x={900} y={500} r={280} color='oklch(65% 0.16 195)' opacity={0.10}/>

      {/* Logo */}
      <div style={{
        position:'absolute', top:200, left:0, right:0, textAlign:'center',
        opacity:logoOp, transform:`scale(${logoScale})`, transformOrigin:'center top'
      }}>
        <div style={{display:'inline-flex', alignItems:'center', gap:16}}>
          {/* Icon mark */}
          <svg width="68" height="68" viewBox="0 0 68 68">
            <defs>
              <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="oklch(68% 0.19 248)"/>
                <stop offset="100%" stopColor="oklch(66% 0.17 290)"/>
              </linearGradient>
            </defs>
            <rect width="68" height="68" rx="16" fill="url(#lg1)" opacity="0.15"/>
            <rect width="68" height="68" rx="16" fill="none" stroke="url(#lg1)" strokeWidth="1.5"/>
            <path d="M18 22h32M18 30h24M18 38h28M18 46h18" stroke="url(#lg1)" strokeWidth="2.5" strokeLinecap="round"/>
            <circle cx="52" cy="46" r="8" fill="url(#lg1)" opacity="0.9"/>
            <path d="M49 46l2 2 4-4" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
          </svg>
          <span style={{fontFamily:FONT, fontSize:72, fontWeight:700, color:C.white, letterSpacing:'-0.03em'}}>
            Doc<span style={{background:'linear-gradient(135deg, oklch(68% 0.19 248), oklch(66% 0.17 290))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>Scribe</span>
          </span>
        </div>

        {/* Animated underline */}
        <div style={{display:'flex', justifyContent:'center', marginTop:8}}>
          <div style={{height:2, width:lineW, background:'linear-gradient(90deg, oklch(68% 0.19 248), oklch(66% 0.17 290))', borderRadius:2, transition:'width 0ms'}}/>
        </div>
      </div>

      <div style={{
        position:'absolute', top:360, left:0, right:0, textAlign:'center',
        opacity:tagOp, fontFamily:FONT, fontSize:32, fontWeight:500, color:C.dim, letterSpacing:'-0.01em'
      }}>AI-powered meeting intelligence</div>

      <div style={{
        position:'absolute', top:430, left:0, right:0, textAlign:'center',
        opacity:desc1Op, fontFamily:FONT, fontSize:22, fontWeight:300, color:C.dim
      }}>Record. Transcribe. Summarize. Act.</div>

      <div style={{
        position:'absolute', top:485, left:0, right:0, textAlign:'center',
        opacity:desc2Op, fontFamily:FONT, fontSize:22, fontWeight:300, color:C.dim
      }}>In seconds — not hours.</div>
    </g>
  );
}

// ─── Scene 4: Feature — Record & Transcribe ───────────────────────────────
// 38 – 54s
function Scene4(){
  const t = useTime();
  const lt = t - 38;
  if(lt < 0) return null;

  const panelOp = clamp((lt-0.3)/0.8,0,1) * (1-clamp((lt-13)/0.8,0,1));
  const titleOp = clamp((lt-0.8)/0.7,0,1) * (1-clamp((lt-13)/0.7,0,1));

  // Waveform bars
  const barCount = 42;
  const bars = Array.from({length:barCount}, (_,i) => {
    const freq = 0.3 + (i%7)*0.15;
    const h = 16 + Math.abs(Math.sin(lt*freq*3.5 + i*0.6)) * 52 + Math.abs(Math.sin(lt*1.2+i*0.3))*20;
    return h;
  });

  // Transcript lines appearing
  const lines = [
    { text: "Sarah:", bold:true, color:C.blue, t:1.5 },
    { text: "Let's align on the Q3 roadmap priorities before we", bold:false, t:1.8 },
    { text: "finalize the sprint. The main concern is capacity.", bold:false, t:2.2 },
    { text: "Mark:", bold:true, color:'oklch(70% 0.15 195)', t:3.2 },
    { text: "Agreed. Engineering is stretched but we can ship the", bold:false, t:3.5 },
    { text: "core auth module if we descope the dashboard redesign.", bold:false, t:3.9 },
    { text: "Sarah:", bold:true, color:C.blue, t:5.0 },
    { text: "That works. Let's make the dashboard a Phase 2 item.", bold:false, t:5.3 },
    { text: "Action: Mark to update the sprint board by EOD.", bold:false, color:'rgba(255,210,80,0.9)', t:6.2 },
    { text: "James:", bold:true, color:C.purple, t:7.8 },
    { text: "Should we loop in design for the auth flow?", bold:false, t:8.1 },
    { text: "Action: Sarah to schedule design review — Friday.", bold:false, color:'rgba(255,210,80,0.9)', t:9.0 },
  ];

  const recPulse = 0.7 + 0.3*Math.sin(lt*4);

  return (
    <g>
      <GridBG opacity={0.5}/>
      <GlowOrb x={960} y={360} r={420} color='oklch(60% 0.2 248)' opacity={0.13}/>

      {/* Left: title */}
      <div style={{
        position:'absolute', left:64, top:120, width:380, opacity:titleOp
      }}>
        <div style={{fontFamily:MONO, fontSize:12, color:C.blue, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:16}}>Feature 01</div>
        <div style={{fontFamily:FONT, fontSize:48, fontWeight:700, color:C.white, lineHeight:1.1, letterSpacing:'-0.02em'}}>
          Instant<br/><span style={{color:C.blue}}>Transcription</span>
        </div>
        <div style={{fontFamily:FONT, fontSize:19, fontWeight:300, color:C.dim, marginTop:20, lineHeight:1.6}}>
          Every word captured.<br/>Every speaker identified.<br/>Real-time, zero effort.
        </div>

        {/* Live badge */}
        <div style={{
          display:'inline-flex', alignItems:'center', gap:8, marginTop:32,
          background:'rgba(255,60,60,0.12)', border:'1px solid rgba(255,60,60,0.3)',
          borderRadius:20, padding:'6px 14px'
        }}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'#ff4444',opacity:recPulse}}/>
          <span style={{fontFamily:MONO, fontSize:13, color:'rgba(255,100,100,0.9)', letterSpacing:'0.1em'}}>LIVE REC</span>
        </div>

        {/* Waveform */}
        <div style={{
          display:'flex', alignItems:'center', gap:2.5, marginTop:28, height:80
        }}>
          {bars.slice(0,22).map((h,i)=>(
            <div key={i} style={{
              width:6, height:h, borderRadius:3,
              background:`linear-gradient(to top, oklch(68% 0.19 248), oklch(72% 0.14 290))`,
              opacity: 0.7 + 0.3*(h/80),
            }}/>
          ))}
        </div>
      </div>

      {/* Right: transcript panel */}
      <div style={{
        position:'absolute', right:64, top:80, width:680, height:560,
        opacity:panelOp,
        background:'rgba(255,255,255,0.03)',
        border:'1px solid rgba(255,255,255,0.08)',
        borderRadius:16,
        overflow:'hidden',
        backdropFilter:'blur(8px)',
      }}>
        {/* Panel header */}
        <div style={{
          display:'flex', alignItems:'center', gap:8, padding:'14px 20px',
          borderBottom:'1px solid rgba(255,255,255,0.06)',
          background:'rgba(255,255,255,0.02)'
        }}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#ff5f56'}}/>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#febc2e'}}/>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#27c840'}}/>
          <div style={{flex:1, textAlign:'center', fontFamily:MONO, fontSize:12, color:C.dim}}>transcript.docscribe.ai</div>
        </div>
        {/* Transcript content */}
        <div style={{padding:'20px 24px', display:'flex', flexDirection:'column', gap:6}}>
          {lines.map((line,i)=>{
            const op = clamp((lt-line.t)/0.4,0,1);
            return (
              <div key={i} style={{
                opacity:op,
                fontFamily: line.bold ? MONO : FONT,
                fontSize: line.bold ? 13 : 16,
                fontWeight: line.bold ? 500 : 400,
                color: line.color || C.white,
                lineHeight: 1.6,
                paddingLeft: line.bold ? 0 : 16,
                letterSpacing: line.bold ? '0.05em' : 0,
              }}>{line.text}</div>
            );
          })}
          {/* Cursor */}
          <div style={{
            width:2, height:18, background:C.blue,
            opacity: Math.sin(lt*3)>0?1:0, marginTop:4,
            marginLeft:16
          }}/>
        </div>
      </div>
    </g>
  );
}

// ─── Scene 5: Feature — AI Summary ────────────────────────────────────────
// 54 – 68s
function Scene5(){
  const t = useTime();
  const lt = t - 54;
  if(lt < 0) return null;

  const titleOp = clamp((lt-0.4)/0.8,0,1) * (1-clamp((lt-11.5)/0.7,0,1));

  const cards = [
    {
      icon:'📋', label:'Summary', color:C.blue,
      lines:['Q3 roadmap aligned.','Dashboard → Phase 2.','Auth module priority confirmed.'],
      t:1.0
    },
    {
      icon:'✅', label:'Action Items', color:'oklch(70% 0.18 150)',
      lines:['Mark: Update sprint board — EOD','Sarah: Schedule design review — Fri','James: Share capacity report — Mon'],

    },
    {
      icon:'👥', label:'Attendees', color:C.purple,

        <div style={{fontFamily:MONO, fontSize:12, color:C.purple, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:16}}>Feature 02</div>
        <div style={{fontFamily:FONT, fontSize:48, fontWeight:700, color:C.white, lineHeight:1.1, letterSpacing:'-0.02em'}}>

        </div>
        <div style={{fontFamily:FONT, fontSize:19, fontWeight:300, color:C.dim, marginTop:20, lineHeight:1.7}}>

// ─── Scene 6: Integrations / Share ────────────────────────────────────────
// 68 – 80s
function Scene6(){
  const t = useTime();
  const lt = t - 68;
  if(lt < 0) return null;

  const titleOp = clamp((lt-0.4)/0.8,0,1) * (1-clamp((lt-10)/0.7,0,1));

  const integrations = [
    { name:'Slack',    color:'#4a154b', icon:'S', x:220, y:270, t:1.0 },
    { name:'Notion',   color:'#1a1a1a', icon:'N', x:460, y:200, t:1.5 },
    { name:'Jira',     color:'#0052cc', icon:'J', x:700, y:270, t:1.0 },
    { name:'Google',   color:'#ea4335', icon:'G', x:940, y:200, t:1.8 },
    { name:'Teams',    color:'#6264a7', icon:'T', x:1060,y:330, t:1.3 },

// ─── Wrapper: Scene Gate (renders nothing before scene start) ─────────────
function G({ children }){ return <>{children}</>; }

// ─── Scene transitions (cross-fade overlay) ───────────────────────────────
function SceneFader({ transitions }){
  const t = useTime();
  return (
    <>
      {transitions.map(([at, dur],i)=>{
        const lt = t - at;
        if(lt < 0 || lt > dur) return null;
        const op = Math.sin((lt/dur)*Math.PI);
        return <div key={i} style={{position:'absolute',inset:0,background:'#060810',opacity:op,pointerEvents:'none'}}/>;
      })}
    </>
  );
}

// ─── Timestamp label (updates every second for comment context) ──────────
function TimestampLabel(){
  const t = useTime();
  const s = Math.floor(t);
  const m = Math.floor(s/60);
  const sec = s%60;
  const label = `${m}:${String(sec).padStart(2,'0')}`;
  return (
    <div
      data-screen-label={label}
      style={{
        position:'absolute', top:12, right:16,
        fontFamily:MONO, fontSize:11, color:'rgba(255,255,255,0.25)',
        letterSpacing:'0.08em', pointerEvents:'none'
      }}
    >{label}</div>
  );
}

// ─── Audio Sync component ─────────────────────────────────────────────────
function AudioSync({ audioRef }){
  const { time, playing, setTime } = useTimeline();

  React.useEffect(()=>{
    const audio = audioRef.current;
    if(!audio) return;
    if(playing){
      audio.currentTime = time;
      audio.play().catch(()=>{});
    } else {
      audio.pause();
    }
  }, [playing]);

  React.useEffect(()=>{
    const audio = audioRef.current;
    if(!audio || !playing) return;
    const diff = Math.abs(audio.currentTime - time);
    if(diff > 0.5) audio.currentTime = time;
  }, [Math.floor(time)]);

  return null;
}
